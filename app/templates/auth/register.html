<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - THE LIMBO</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            background: white;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="register-card">
        <div class="register-header">
            <h4>Create Account</h4>
            <p class="text-muted">Join The Limbo</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Register</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none">Already have an account? Sign in</a>
        </div>
    </div>

    <script>
        async function handleRegister(event) {
            event.preventDefault();
            const full_name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorAlert = document.getElementById('error-alert');

            if (password !== confirmPassword) {
                errorAlert.textContent = 'Passwords do not match';
                errorAlert.classList.remove('d-none');
                return;
            }

            if (password.length < 8) {
                errorAlert.textContent = 'Password must be at least 8 characters long';
                errorAlert.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ full_name, email, password })
                });

                if (response.ok) {
                    // Auto login or redirect to login?
                    // Let's redirect to login for now, or use the token if returned.
                    // Assume the API might login or just create.
                    // I will implement API to login on register or just create.
                    // Let's assume just create for now.
                    alert('Registration successful! Please login.');
                    window.location.href = '/login';
                } else {
                    const data = await response.json();
                    errorAlert.textContent = data.detail || 'Registration failed';
                    errorAlert.classList.remove('d-none');
                }
            } catch (error) {
                console.error('Error:', error);
                errorAlert.textContent = 'An error occurred. Please try again.';
                errorAlert.classList.remove('d-none');
            }
        }
    </script>
</body>

</html>
