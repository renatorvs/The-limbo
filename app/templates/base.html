<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}THE-LIMBO{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
            /* Bootstrap bg-light equivalent */
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background-color: #1a1a1a;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background-color: #0d6efd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            padding-top: 20px;
        }

        .sidebar-menu li a {
            color: #adb5bd;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            font-size: 0.95rem;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }

        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            color: #fff;
            background-color: #2c3036;
            border-left-color: #0d6efd;
        }

        .sidebar-menu li a i {
            width: 25px;
            text-align: center;
            margin-right: 10px;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid #333;
            background-color: #111;
        }

        .user-profile {
            display: flex;
            align-items: center;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background-color: #6c757d;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .content {
            margin-left: 250px;
            /* Width of sidebar */
            padding: 20px;
            width: calc(100% - 250px);
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div>
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-infinity text-white"></i>
                </div>
                <div>
                    <div class="fw-bold text-white small">THE-LIMBO</div>
                    <!-- Company Switcher -->
                    <select id="companySwitcher" class="form-select form-select-sm bg-dark text-white border-secondary"
                        style="font-size: 0.7rem; width: 140px;" onchange="switchCompany(this.value)">
                        <option selected disabled>Loading...</option>
                    </select>
                </div>
            </div>

            <ul class="sidebar-menu">
                <li>
                    <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                        <i class="fas fa-chart-pie"></i> Overview
                    </a>
                </li>
                <li>
                    <a href="/api/v1/backbone/dashboard"
                        class="{% if 'backbone' in request.url.path %}active{% endif %}">
                        <i class="fas fa-wallet"></i> Backbone
                    </a>
                </li>
                <li>
                    <a href="/api/v1/growth/dashboard" class="{% if 'growth' in request.url.path %}active{% endif %}">
                        <i class="fas fa-rocket"></i> Growth
                    </a>
                </li>
                <li>
                    <a href="/api/v1/product/dashboard" class="{% if 'product' in request.url.path %}active{% endif %}">
                        <i class="fas fa-tasks"></i> Product
                    </a>
                </li>
                <li>
                    <a href="/api/v1/cs/dashboard" class="{% if 'cs' in request.url.path %}active{% endif %}">
                        <i class="fas fa-handshake"></i> Customer Success
                    </a>
                </li>
                <li>
                    <a href="/api/v1/advisory/dashboard"
                        class="{% if 'advisory' in request.url.path %}active{% endif %}">
                        <i class="fas fa-brain"></i> The Oracle
                    </a>
                </li>
                <li>
                    <a href="/glossary" class="{% if request.url.path == '/glossary' %}active{% endif %}">
                        <i class="fas fa-book-open"></i> Glossary
                    </a>
                </li>
                <li>
                    <a href="/api/v1/backbone/companies_view"
                        class="{% if 'companies_view' in request.url.path %}active{% endif %}">
                        <i class="fas fa-building"></i> Companies
                    </a>
                </li>
            </ul>
        </div>

        <div class="sidebar-footer">
            {% if request.cookies.get("access_token") %}
            <div class="user-profile mb-2">
                <div class="user-avatar text-white">U</div>
                <div class="text-truncate">
                    <div class="text-white small fw-bold">User</div>
                    <div class="text-muted small" style="font-size: 0.7rem;">Logged In</div>
                </div>
            </div>
            <a href="/api/v1/auth/logout" class="btn btn-sm btn-outline-danger w-100">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
            {% else %}
            <a href="/api/v1/auth/login" class="btn btn-sm btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <div class="mt-2 text-center">
                <a href="/api/v1/auth/register" class="text-muted small" style="font-size: 0.75rem;">Create Account</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <!-- Create Company Modal -->
    <div class="modal fade" id="createCompanyModal" tabindex="-1" aria-labelledby="createCompanyModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createCompanyModalLabel">New Company</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="createCompanyForm">
                        <div class="mb-3">
                            <label for="companyName" class="form-label">Company Name</label>
                            <input type="text" class="form-control" id="companyName" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="companyCNPJ" class="form-label">CNPJ / Tax ID</label>
                            <input type="text" class="form-control" id="companyCNPJ" name="cnpj_or_tax_id">
                        </div>
                        <div class="mb-3">
                            <label for="companyIndustry" class="form-label">Industry</label>
                            <input type="text" class="form-control" id="companyIndustry" name="industry">
                        </div>
                        <div class="mb-3">
                            <label for="companyLogo" class="form-label">Logo URL</label>
                            <input type="text" class="form-control" id="companyLogo" name="logo_url">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="submitCreateCompany()">Create
                        Company</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Active link logic fallback if Jinja logic isn't enough (for complex paths)
        const currentPath = window.location.pathname;
        const menuLinks = document.querySelectorAll('.sidebar-menu a');
        menuLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });

        async function submitCreateCompany() {
            const form = document.getElementById('createCompanyForm');
            const data = {
                name: form.name.value,
                cnpj_or_tax_id: form.cnpj_or_tax_id.value,
                industry: form.industry.value,
                logo_url: form.logo_url.value
            };

            try {
                const response = await fetch('/api/v1/backbone/companies', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Company created successfully!');
                    location.reload();
                } else {
                    const error = await response.json();
                    alert('Error creating company: ' + JSON.stringify(error));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while creating the company.');
            }
        }

        async function loadCompanies() {
            try {
                const response = await fetch('/api/v1/backbone/companies');
                if (response.ok) {
                    const companies = await response.json();
                    const switcher = document.getElementById('companySwitcher');
                    switcher.innerHTML = '<option disabled>Select Company</option>';

                    // Get current company from somewhere? For now just show list.
                    // Ideally we'd know which one is selected.
                    // We can check if we have a stored ID
                    // But the backend knows the current user's company.

                    companies.forEach(company => {
                        const option = document.createElement('option');
                        option.value = company.id;
                        option.text = company.name;
                        switcher.appendChild(option);
                    });

                    // Simple "Selected" logic if we had the ID in the template context

                }
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }

        async function switchCompany(companyId) {
            try {
                const response = await fetch(`/api/v1/backbone/switch-context/${companyId}`, {
                    method: 'POST'
                });
                if (response.ok) {
                    location.reload();
                } else {
                    // Try auth route if backbone one doesn't exist (Wait, I put it in auth router)
                    const responseAuth = await fetch(`/api/v1/auth/switch-context/${companyId}`, {
                        method: 'POST'
                    });
                    if (responseAuth.ok) {
                        location.reload();
                    } else {
                        alert('Failed to switch company');
                    }
                }
            } catch (error) {
                console.error('Error switching:', error);
            }
        }

        // Auto-login (Dev only)
        async function checkDevLogin() {
            // We can just try to hit an endpoint. If 401, try dev-login.
            // Or just call dev-login on load if not logged in.
            // Simplest: Call dev-login once on app load to ensure cookie is set.
            await fetch('/api/v1/auth/dev-login', { method: 'POST' });
        }

        window.addEventListener('DOMContentLoaded', () => {
            checkDevLogin().then(() => {
                loadCompanies();
            });
        });
    </script>
</body>

</html>
